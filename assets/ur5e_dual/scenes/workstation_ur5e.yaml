# Workstation scene descriptor — a bimanual UR5e cell (bench + 2 UR5e + 2F-85 grippers).
#
# DATA, not code. The `pinocchio` (IK + safety) and the sim nodes (`mujoco-sim`/`genesis`)
# each read it with their own small loader — no shared Python module (CLAUDE.md). Same
# generic vocabulary as the Trossen descriptor; a different robot/cell is a new descriptor,
# not node edits. See assets/trossen_stationary/scenes/workstation.yaml for the full notes.
#
# Cell geometry (real workstation): the two arms face the SAME way (+x, forward), side by
# side along y, base-to-base 0.70 m; the bench surface is 0.105 m below each arm base. These
# are baked into the MJCF by model/build_scene.py.
#
# Paths are relative to the scene root (assets/ur5e_dual/).

name: workstation_ur5e

# One universal, self-contained model (bench + 2 arms + grippers) parsed by EVERY
# consumer — mujoco-sim, genesis, the rerun 3D view, and pinocchio. No floor: MuJoCo
# has a default headlight and genesis adds its own ground.
model: model/ur5e_dual.xml

# Actuated subsystems. n (DOF) = len(joints). Names are the compiled MuJoCo joint/site/
# actuator names (build_scene.py prefixes the arm `<side>_` and the gripper `<side>_g_`, and
# MjSpec suffixes joints with `_joint`). Arms carry the IK end-effector frame (the 2F-85
# `pinch` site); grippers are joint-only (no IK).
parts:
  left:
    type: arm
    prefix: left_
    joints: [left_shoulder_pan_joint, left_shoulder_lift_joint, left_elbow_joint,
             left_wrist_1_joint, left_wrist_2_joint, left_wrist_3_joint]
    ee_frame: left_ee_site                 # site on wrist_3_link at the gripper TCP (parsed
                                           # identically by pinocchio + mujoco; see build_scene.add_ee_sites)
    ee_link: left_g_base                   # genesis: ee = link + offset (pinch is 0.145 up the gripper base)
    ee_offset: [0.0, 0.0, 0.145]
    max_step: 0.2                          # max joint motion per control step (rad) — loose, for snappy tracking
  left_gripper:
    type: gripper
    prefix: left_                          # same collision group as the left arm
    joints: [left_g_right_driver_joint]    # the 2F-85 driver joint (equality couples the rest)
    actuator: left_gripper
    open: 0.0                              # driver-joint radians: 0 = open ...
    closed: 0.8                            # ... 0.8 rad = closed (2F-85 range)
    max_step: 0.4                          # rad / step (gripper is fast — different units than arms)
  right:
    type: arm
    prefix: right_
    joints: [right_shoulder_pan_joint, right_shoulder_lift_joint, right_elbow_joint,
             right_wrist_1_joint, right_wrist_2_joint, right_wrist_3_joint]
    ee_frame: right_ee_site
    ee_link: right_g_base
    ee_offset: [0.0, 0.0, 0.145]
    max_step: 0.2
  right_gripper:
    type: gripper
    prefix: right_
    joints: [right_g_right_driver_joint]
    actuator: right_gripper
    open: 0.0
    closed: 0.8
    max_step: 0.4

# Safety constraints the pinocchio gate enforces.
constraints:
  # Keep every part's ee above the bench surface (world z). The bench top is at z=0.75.
  - type: plane
    axis: z
    min: 0.75
  # The two arm sides (arm + its gripper share a group, by MJCF frame-name prefix) must not
  # collide. Gripper collision is the 2F-85's box finger pads (mesh collision is demoted to
  # non-colliding in build_scene.py: coal segfaults on mesh-vs-mesh distance).
  - type: self_collision
    groups: [left_, right_]
    margin: 0.02

# Named command-vector layouts (controller fills one; pinocchio reads the same name). Web
# teleop commands the arms in Cartesian; leader/policy in joint space. Grippers are always
# joint-space (driver-joint radians).
command_layouts:
  cartesian:
    - {part: left,          space: cartesian, quantity: position, dim: 7}
    - {part: left_gripper,  space: joint,     quantity: position, dim: 1}
    - {part: right,         space: cartesian, quantity: position, dim: 7}
    - {part: right_gripper, space: joint,     quantity: position, dim: 1}
  joint:
    - {part: left,          space: joint, quantity: position, dim: 6}
    - {part: left_gripper,  space: joint, quantity: position, dim: 1}
    - {part: right,         space: joint, quantity: position, dim: 6}
    - {part: right_gripper, space: joint, quantity: position, dim: 1}

# Measured whole-robot state vector (joint positions per part), produced by the sim / a sync
# of the real arms, consumed by pinocchio (feedback) + the recorders. Total dim 14.
state_layout:
  - {part: left,          space: joint, quantity: position, dim: 6}
  - {part: left_gripper,  space: joint, quantity: position, dim: 1}
  - {part: right,         space: joint, quantity: position, dim: 6}
  - {part: right_gripper, space: joint, quantity: position, dim: 1}

# Manipulands (cubes, etc.) are intentionally NOT part of the base scene — they'll be added
# separately later (a mode/arg), so this descriptor stays "workstation + robots" only.

# Cameras live in the MJCF <camera> elements, never here. This MJCF defines none yet —
# TODO: add <camera> to model/ur5e_dual.xml (build_scene.py), then re-enable the sim
# flows' camera wiring.
