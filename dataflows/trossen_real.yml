# LOCAL bimanual real Trossen stationary web teleop, single machine (the robot host),
# no cameras / no recording — the simple first-contact flow for the real cell.
#
# web-controller (browser, manual Cartesian) --command--> pinocchio (IK + safety)
#   --<side>_joint_target--> followers module (2x trossen-robot joint control + state_sync),
#   whose bundled `state` (dim 14) feeds back to pinocchio; manager gates startup/liveness;
#   rerun-view shows both 3D arms. Disconnect rides `robot_command`.
#
#   build: uv run --env-file dataflows/robot_envs/trossen-1.env dora build  dataflows/trossen_real.yml
#   run:   uv run --env-file dataflows/robot_envs/trossen-1.env dora start --attach dataflows/trossen_real.yml
#   then open http://127.0.0.1:8421

nodes:
  - id: manager
    build: uv sync --project nodes/manager
    path: nodes/manager/.venv/bin/manager
    inputs:
      arm_left:   followers/left_node_state
      arm_right:  followers/right_node_state
      state_sync: followers/node_state
      pinocchio:  pinocchio/node_state
      controller: controller/robot_command   # Disconnect button -> program_state disconnect
    outputs: [program_state]
    env:
      MODE: "teleop"
      PRODUCERS: "arm_left,arm_right,pinocchio,state_sync"

  - id: controller
    build: uv sync --project nodes/web-controller
    path: nodes/web-controller/.venv/bin/web-controller
    inputs:
      tick: dora/timer/millis/33
      program_state: manager/program_state
      # Anchor targets in pinocchio's model frame (FK of measured joints) — never the raw arm TCP.
      left_tcp_pose:       { source: pinocchio/left_measured_pose,  queue_size: 1, queue_policy: drop_oldest }
      right_tcp_pose:      { source: pinocchio/right_measured_pose, queue_size: 1, queue_policy: drop_oldest }
      left_solution_pose:  { source: pinocchio/left_solution_pose,  queue_size: 1, queue_policy: drop_oldest }
      right_solution_pose: { source: pinocchio/right_solution_pose, queue_size: 1, queue_policy: drop_oldest }
    outputs: [command, episode_control, robot_command, node_state]
    env:
      MODE: "manual"
      SCENE: "assets/trossen_stationary/scenes/workstation.yaml"
      COMMAND_LAYOUT: "cartesian"
      HOST: "127.0.0.1"
      PORT: "8421"

  - id: pinocchio
    build: uv sync --project nodes/pinocchio
    path: nodes/pinocchio/.venv/bin/pinocchio-node
    inputs:
      command: { source: controller/command, queue_size: 1, queue_policy: drop_oldest }
      state:   { source: followers/state,    queue_size: 1, queue_policy: drop_oldest }
      program_state: manager/program_state
    outputs: [left_joint_target, left_gripper_joint_target, right_joint_target, right_gripper_joint_target,
              left_solution_pose, right_solution_pose, left_measured_pose, right_measured_pose, node_state]
    env:
      MODE: "control"
      SCENE: "assets/trossen_stationary/scenes/workstation.yaml"
      COMMAND_LAYOUT: "cartesian"

  # 2x trossen-robot followers + state_sync (see modules/trossen_pair_module.yml).
  - id: followers
    module: modules/trossen_pair_module.yml
    inputs:
      program_state: manager/program_state
      left_joint_target: pinocchio/left_joint_target
      left_gripper_joint_target: pinocchio/left_gripper_joint_target
      right_joint_target: pinocchio/right_joint_target
      right_gripper_joint_target: pinocchio/right_gripper_joint_target
      robot_command: controller/robot_command

  - id: rerun-view
    build: uv sync --project nodes/rerun
    path: nodes/rerun/.venv/bin/rerun-node
    inputs:
      left_tcp_pose:  { source: followers/left_tcp_pose,  queue_size: 1, queue_policy: drop_oldest }
      right_tcp_pose: { source: followers/right_tcp_pose, queue_size: 1, queue_policy: drop_oldest }
      state:          { source: followers/state,          queue_size: 1, queue_policy: drop_oldest }
      program_state: manager/program_state
    env:
      MODE: "visualize"
      APP_ID: "trossen_real"
      VISUALIZE__SINK: "spawn"
      VISUALIZE__CAMERAS: ""
      VISUALIZE__MEMORY_LIMIT: "2GB"
