# Module: the trossen-mobile camera rig — 2 RealSense wrist cameras + 1 USB (OpenCV)
# static camera on the cart. Each camera is its own node (one node = one device);
# RealSense serials + the v4l device path come from the host env-file (${WRIST1},
# ${WRIST2}, ${STATIC1}).
#
# The cameras capture on a background thread and publish each captured frame as it
# lands — the wire rate IS the per-camera sensor FPS (no tick, no timer-phase lag).
# Consumers that record (lerobot FPS) must match the FPS set here.
#
# TODO(dora): inner paths go through the `dataflows/nodes` symlink because dora
# rejects module node paths outside the dataflow's directory — see dataflows/README.md.

module:
  name: trossen_mobile_rig
  inputs:
    - program_state
  outputs:
    - cam_wrist1_image
    - cam_wrist2_image
    - cam_static1_image
    - cam_wrist1_node_state
    - cam_wrist2_node_state
    - cam_static1_node_state

nodes:
  - id: cam_wrist1
    build: uv sync --project nodes/realsense-camera
    path: ../nodes/realsense-camera/.venv/bin/realsense-camera
    inputs:
      program_state: _mod/program_state
    outputs: [cam_wrist1_image, cam_wrist1_node_state]
    env: { CAMERA_NAME: "cam_wrist1", FPS: "30", SERIAL: "${WRIST1}", ENCODING: "jpeg", JPEG_QUALITY: "70" }

  - id: cam_wrist2
    build: uv sync --project nodes/realsense-camera
    path: ../nodes/realsense-camera/.venv/bin/realsense-camera
    inputs:
      program_state: _mod/program_state
    outputs: [cam_wrist2_image, cam_wrist2_node_state]
    env: { CAMERA_NAME: "cam_wrist2", FPS: "30", SERIAL: "${WRIST2}", ENCODING: "jpeg", JPEG_QUALITY: "70" }

  # USB camera on the cart ("H264 USB Camera"): opencv-camera takes a device index
  # or a v4l path via CAMERA_INDEX — use the stable /dev/v4l/by-id/... path (bare
  # /dev/videoN renumbers; the cart's RealSenses own 12 of those nodes). It tops out
  # ~26 fps; 15 fps is plenty for the context view and halves its wire cost.
  - id: cam_static1
    build: uv sync --project nodes/opencv-camera
    path: ../nodes/opencv-camera/.venv/bin/opencv-camera
    inputs:
      program_state: _mod/program_state
    outputs: [cam_static1_image, cam_static1_node_state]
    env: { CAMERA_NAME: "cam_static1", FPS: "15", CAMERA_INDEX: "${STATIC1}", ENCODING: "jpeg", JPEG_QUALITY: "60" }
