# Module: bimanual UR5e FOLLOWER cell — arm_left + arm_right (ur5e-robot, servoJ joint
# control) + state_sync bundling both arms' per-part state into the whole-robot `state`
# vector (dim 14; order matches the scene state_layout: left, left_gripper, right,
# right_gripper).
#
# Env (from the host env-file): ${LEFT_UR_IP}, ${RIGHT_UR_IP}.
# FOLLOWER__WITH_GRIPPER false: the Robotiq is wired to the PC, not the UR controller —
# gripper control is skipped for now (see the robotiq-gripper TODO in the README).
#
# TODO(dora): inner paths go through the `dataflows/nodes` symlink because dora
# rejects module node paths outside the dataflow's directory — see dataflows/README.md.

module:
  name: ur5e_pair
  inputs:
    - program_state
    - left_joint_target
    - left_gripper_joint_target
    - right_joint_target
    - right_gripper_joint_target
  inputs_optional:
    - robot_command
  outputs:
    - state
    - left_tcp_pose
    - right_tcp_pose
    - left_joint_state
    - left_gripper_state
    - right_joint_state
    - right_gripper_state
    - left_node_state
    - right_node_state
    - node_state   # state_sync's health edge

nodes:
  - id: arm_left
    build: uv sync --project nodes/ur5e-robot
    path: ../nodes/ur5e-robot/.venv/bin/ur5e-robot
    inputs:
      tick: dora/timer/millis/33
      program_state: _mod/program_state
      left_joint_target:         { source: _mod/left_joint_target,         queue_size: 1, queue_policy: drop_oldest }
      left_gripper_joint_target: { source: _mod/left_gripper_joint_target, queue_size: 1, queue_policy: drop_oldest }
      robot_command:             { source: _mod/robot_command,             queue_size: 1, queue_policy: drop_oldest }
    outputs: [left_tcp_pose, left_joint_state, left_gripper_state, left_node_state]
    env: { NAME: "left", IP: "${LEFT_UR_IP}", MODE: "follower", FOLLOWER__WITH_GRIPPER: "false" }

  - id: arm_right
    build: uv sync --project nodes/ur5e-robot
    path: ../nodes/ur5e-robot/.venv/bin/ur5e-robot
    inputs:
      tick: dora/timer/millis/33
      program_state: _mod/program_state
      right_joint_target:         { source: _mod/right_joint_target,         queue_size: 1, queue_policy: drop_oldest }
      right_gripper_joint_target: { source: _mod/right_gripper_joint_target, queue_size: 1, queue_policy: drop_oldest }
      robot_command:              { source: _mod/robot_command,              queue_size: 1, queue_policy: drop_oldest }
    outputs: [right_tcp_pose, right_joint_state, right_gripper_state, right_node_state]
    env: { NAME: "right", IP: "${RIGHT_UR_IP}", MODE: "follower", FOLLOWER__WITH_GRIPPER: "false" }

  - id: state_sync
    build: uv sync --project nodes/sync
    path: ../nodes/sync/.venv/bin/sync-node
    inputs:
      tick: dora/timer/millis/33
      program_state: _mod/program_state
      left_joint_state:    { source: arm_left/left_joint_state,     queue_size: 1, queue_policy: drop_oldest }
      left_gripper_state:  { source: arm_left/left_gripper_state,   queue_size: 1, queue_policy: drop_oldest }
      right_joint_state:   { source: arm_right/right_joint_state,   queue_size: 1, queue_policy: drop_oldest }
      right_gripper_state: { source: arm_right/right_gripper_state, queue_size: 1, queue_policy: drop_oldest }
    outputs: [state, node_state]
    env:
      INPUTS: "left_joint_state,left_gripper_state,right_joint_state,right_gripper_state"
      OUTPUT: "state"
      MAX_STALE: "0.1"
