# LOCAL Trossen stationary teleop + recording in the GENESIS sim.
#
# Same graph as trossen_stationary_mujoco.yml with the genesis backend: web-controller
# --command(cartesian bundle)--> pinocchio (IK + safety) --<part>_joint_target--> genesis
# (physics + cameras) --state(bundle) + <part>_tcp_pose + cam_*--> recorders.
#
# Genesis renders INLINE on the dora loop (its renderer needs the main thread) and runs
# sub-realtime with cameras on a Mac (~8-10 Hz), so the tick is 100 ms and the recorders'
# FPS is 10 to match the actual wire rate (physics itself auto-paces to wall-clock).
# On a CUDA box raise the tick rate + FPS together.
#
#   build: uv run dora build dataflows/trossen_stationary_genesis.yml
#   run:   uv run dora start --attach dataflows/trossen_stationary_genesis.yml
#   then open http://127.0.0.1:8421

nodes:
  - id: manager
    build: uv sync --project nodes/manager
    path: nodes/manager/.venv/bin/manager
    inputs:
      genesis: genesis/node_state
      pinocchio: pinocchio/node_state
      controller: controller/robot_command   # Disconnect button -> program_state disconnect
    outputs: [program_state]
    env:
      MODE: "teleop"
      PRODUCERS: "genesis,pinocchio"

  - id: controller
    build: uv sync --project nodes/web-controller
    path: nodes/web-controller/.venv/bin/web-controller
    inputs:
      tick: dora/timer/millis/33
      program_state: manager/program_state
      # Current-pose feedback = pinocchio's model-frame FK of the MEASURED joints (the same frame
      # it solves IK in), not the sim's raw tcp_pose — so seeding/anchoring the target never lunges.
      left_tcp_pose:       { source: pinocchio/left_measured_pose,  queue_size: 1, queue_policy: drop_oldest }
      right_tcp_pose:      { source: pinocchio/right_measured_pose, queue_size: 1, queue_policy: drop_oldest }
      left_solution_pose:  { source: pinocchio/left_solution_pose,  queue_size: 1, queue_policy: drop_oldest }
      right_solution_pose: { source: pinocchio/right_solution_pose, queue_size: 1, queue_policy: drop_oldest }
    outputs: [command, episode_control, robot_command, node_state]
    env:
      MODE: "manual"
      SCENE: "assets/trossen_stationary/scenes/workstation.yaml"
      COMMAND_LAYOUT: "cartesian"
      HOST: "127.0.0.1"
      PORT: "8421"

  - id: pinocchio
    build: uv sync --project nodes/pinocchio
    path: nodes/pinocchio/.venv/bin/pinocchio-node
    # Event-driven: solves on each `command`, using the latest `state` as feedback.
    inputs:
      command: { source: controller/command, queue_size: 1, queue_policy: drop_oldest }
      state:   { source: genesis/state,      queue_size: 1, queue_policy: drop_oldest }
      program_state: manager/program_state
    outputs: [left_joint_target, left_gripper_joint_target, right_joint_target, right_gripper_joint_target,
              left_solution_pose, right_solution_pose, left_measured_pose, right_measured_pose, node_state]
    env:
      MODE: "control"
      SCENE: "assets/trossen_stationary/scenes/workstation.yaml"
      COMMAND_LAYOUT: "cartesian"

  - id: genesis
    build: uv sync --project nodes/genesis
    path: nodes/genesis/.venv/bin/genesis-node
    inputs:
      tick: dora/timer/millis/100
      program_state: manager/program_state
      left_joint_target:          { source: pinocchio/left_joint_target,          queue_size: 1, queue_policy: drop_oldest }
      left_gripper_joint_target:  { source: pinocchio/left_gripper_joint_target,  queue_size: 1, queue_policy: drop_oldest }
      right_joint_target:         { source: pinocchio/right_joint_target,         queue_size: 1, queue_policy: drop_oldest }
      right_gripper_joint_target: { source: pinocchio/right_gripper_joint_target, queue_size: 1, queue_policy: drop_oldest }
    outputs:
      - state
      - left_tcp_pose
      - right_tcp_pose
      - cam_high
      - cam_low
      - cam_left_wrist
      - cam_right_wrist
      - node_state
    env:
      MODE: "sim"
      SCENE: "assets/trossen_stationary/scenes/workstation.yaml"
      # Camera names = MJCF <camera> elements (the model is the camera source of truth).
      CAMERAS: "cam_high,cam_low,cam_left_wrist,cam_right_wrist"
      WIDTH: "640"
      HEIGHT: "480"
      ENCODING: "jpeg"
      HEADLESS: "true"
      BACKEND: ""   # auto (gpu -> Metal on macOS, CUDA elsewhere); "cpu" to force CPU

  - id: rerun-view
    build: uv sync --project nodes/rerun
    path: nodes/rerun/.venv/bin/rerun-node
    inputs:
      cam_high:        { source: genesis/cam_high,        queue_size: 1, queue_policy: drop_oldest }
      cam_low:         { source: genesis/cam_low,         queue_size: 1, queue_policy: drop_oldest }
      cam_left_wrist:  { source: genesis/cam_left_wrist,  queue_size: 1, queue_policy: drop_oldest }
      cam_right_wrist: { source: genesis/cam_right_wrist, queue_size: 1, queue_policy: drop_oldest }
      left_tcp_pose:   { source: genesis/left_tcp_pose,   queue_size: 1, queue_policy: drop_oldest }
      right_tcp_pose:  { source: genesis/right_tcp_pose,  queue_size: 1, queue_policy: drop_oldest }
      state:           { source: genesis/state,           queue_size: 1, queue_policy: drop_oldest }
      program_state: manager/program_state
    env:
      MODE: "visualize"
      APP_ID: "trossen_stationary_genesis"
      VISUALIZE__SINK: "spawn"
      VISUALIZE__MEMORY_LIMIT: "2GB"
      VISUALIZE__CAMERAS: "cam_high,cam_low,cam_left_wrist,cam_right_wrist"
      VISUALIZE__SCENE: "assets/trossen_stationary/scenes/workstation.yaml"

  - id: rerun-record
    build: uv sync --project nodes/rerun
    path: nodes/rerun/.venv/bin/rerun-node
    inputs:
      cam_high: genesis/cam_high
      cam_low: genesis/cam_low
      cam_left_wrist: genesis/cam_left_wrist
      cam_right_wrist: genesis/cam_right_wrist
      left_tcp_pose: genesis/left_tcp_pose
      right_tcp_pose: genesis/right_tcp_pose
      state: genesis/state
      command: controller/command
      control: controller/episode_control
      program_state: manager/program_state
    outputs: [node_state]
    env:
      MODE: "record"
      APP_ID: "trossen_stationary_genesis"
      RECORD__RRD_DIR: "out/rerun_trossen_stationary_genesis"
      RECORD__FPS: "10"
      RECORD__IMAGE_MODE: "h264"

  - id: lerobot
    build: uv sync --project nodes/lerobot
    path: nodes/lerobot/.venv/bin/lerobot-node
    # Records cameras + the whole-robot state vector (observation.state) + the command vector
    # (action). lerobot concatenates its configured inputs; one bundle each.
    inputs:
      cam_high: genesis/cam_high
      cam_low: genesis/cam_low
      cam_left_wrist: genesis/cam_left_wrist
      cam_right_wrist: genesis/cam_right_wrist
      state: genesis/state
      command: controller/command
      control: controller/episode_control
      program_state: manager/program_state
    outputs: [node_state]
    env:
      REPO_ID: "test/trossen_stationary_genesis"
      REPO_ROOT: "out/lerobot_trossen_stationary_genesis"
      FPS: "10"
      CAMERAS: "cam_high,cam_low,cam_left_wrist,cam_right_wrist"
      IMAGE_WIDTH: "640"
      IMAGE_HEIGHT: "480"
      STATE_INPUTS: "state"
      STATE_DIM: "14"
      ACTION_INPUTS: "command"
      ACTION_DIM: "16"
